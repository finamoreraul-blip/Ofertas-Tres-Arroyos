      let mensajeWpp = encodeURIComponent(`Hola! Vi en Ofertas Tres Arroyos el producto: ${p.titulo} por ${p.precio}. ¿Tenés stock y hacés entrega en Tres Arroyos?`);

      grid.innerHTML += `
        <div class="card">
          <div class="carousel" id="carousel-${index}">
            ${imgs}
            <button class="carousel-btn prev" onclick="event.stopPropagation(); cambiarFoto(${index}, -1)">‹</button>
            <button class="carousel-btn next" onclick="event.stopPropagation(); cambiarFoto(${index}, 1)">›</button>
          </div>
          <div class="card-content">

            <div class="desc">${p.desc}</div>

    function cambiarFoto(cardIndex, dir) {
      const carousel = document.getElementById(`carousel-${cardIndex}`);
      const imgs = carousel.querySelectorAll('img');
      let activeIndex = [...imgs].findIndex(img => img.classList.contains('active'));
      imgs[activeIndex].classList.remove('active');
      activeIndex = (activeIndex + dir + imgs.length) % imgs.length;
      imgs[activeIndex].classList.add('active');
    }

    function abrirLightbox(productoIndex) {
      lightboxFotos = productos[productoIndex].fotos;
      const carousel = document.getElementById(`carousel-${productoIndex}`);
      lightboxIndex = [...carousel.querySelectorAll('img')].findIndex(img => img.classList.contains('active'));
      document.getElementById('lightbox-img').src = lightboxFotos[lightboxIndex];
      document.getElementById('lightbox').classList.add('active');
    }

    function cerrarLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    function cambiarLightbox(dir) {
      lightboxIndex = (lightboxIndex + dir + lightboxFotos.length) % lightboxFotos.length;
      document.getElementById('lightbox-img').src = lightboxFotos[lightboxIndex];
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if(e.target.id === 'lightbox') cerrarLightbox();
    });
