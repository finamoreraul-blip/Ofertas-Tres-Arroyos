<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofertas Tres Arroyos | Compras por Mercado Libre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; }
    header { background: #ffe600; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    header h1 { color: #333; font-size: 28px; }
    header p { color: #333; font-size: 14px; margin-top: 5px; }
   .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
   .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
   .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.3s; }
   .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

    /* CARRUSEL */
   .carousel { position: relative; width: 100%; height: 240px; overflow: hidden; background: #eee; }
   .carousel img { width: 100%; height: 240px; object-fit: cover; display: none; }
   .carousel img.active { display: block; }
   .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 8px 12px; cursor: pointer; font-size: 18px; }
   .carousel-btn.prev { left: 5px; }
   .carousel-btn.next { right: 5px; }

   .card-content { padding: 15px; }
   .card h3 { font-size: 16px; color: #333; margin-bottom: 8px; }
   .desc { font-size: 13px; color: #666; margin: 8px 0; line-height: 1.4; }
   .precio { font-size: 24px; color: #00a650; font-weight: bold; }
   .cuotas { font-size: 14px; color: #333; margin-bottom: 10px; }
   .btn { display: block; background: #3483fa; color: white; text-align: center; padding: 12px; border-radius: 6px; text-decoration: none; font-weight: bold; transition: 0.3s; }
   .btn:hover { background: #2968c8; }
    footer { text-align: center; padding: 20px; color: #666; font-size: 12px; margin-top: 40px; }
  </style>
</head>
<body>

  <header>
    <h1>🛍️ OFERTAS TRES ARROYOS</h1>
    <p>Compras con garantía de Mercado Libre. Soporte local por WhatsApp</p>
  </header>

  <div class="container">
    <div class="grid" id="productos"></div>
  </div>

  <footer>
    © 2026 Ofertas Tres Arroyos. Enlaces de afiliado de Mercado Libre.
  </footer>

  <script>
    // ====== ACA EDITAS TUS PRODUCTOS ======
    const productos = [
      {
        fotos: [
          "PEGAR LINK FOTO 1 AQUI",
          "PEGAR LINK FOTO 2 AQUI",
          "PEGAR LINK FOTO 3 AQUI"
        ],
        titulo: "Cinta Caminadora De Caminar Correr Plana Enerfit T2000a Color Negro",
        precio: "$361.000",
        cuotas: "o 6 cuotas de $81.218,98",
        desc: "Plegable. Peso máx: 100kg. Potencia: 1.25HP. Incluye monitoreo de frecuencia cardíaca. Medidas: 60cm ancho x 1.03m alto x 1.18m largo.",
        link: "https://meli.la/2TvBEkf"
      }
    ];
    // ====== NO TOQUES DE ACA PARA ABAJO ======

    const grid = document.getElementById('productos');
    productos.forEach((p, index) => {
      let imgs = p.fotos.map((f, i) => `<img src="${f}" class="${i===0?'active':''}">`).join('');
      grid.innerHTML += `
        <div class="card">
          <div class="carousel" id="carousel-${index}">
            ${imgs}
            <button class="carousel-btn prev" onclick="cambiarFoto(${index}, -1)">‹</button>
            <button class="carousel-btn next" onclick="cambiarFoto(${index}, 1)">›</button>
          </div>
          <div class="card-content">
            <h3>${p.titulo}</h3>
            <div class="desc">${p.desc}</div>
            <div class="precio">${p.precio}</div>
            <div class="cuotas">${p.cuotas}</div>
            <a href="${p.link}" target="_blank" class="btn">COMPRAR AHORA</a>
          </div>
        </div>
      `;
    });

    function cambiarFoto(cardIndex, dir) {
      const carousel = document.getElementById(`carousel-${cardIndex}`);
      const imgs = carousel.querySelectorAll('img');
      let activeIndex = [...imgs].findIndex(img => img.classList.contains('active'));
      imgs[activeIndex].classList.remove('active');
      activeIndex = (activeIndex + dir + imgs.length) % imgs.length;
      imgs[activeIndex].classList.add('active');
    }
  </script>

</body>
</html>
